<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Séminaire Finance 2025</title>
  <style>
    html, body { margin:0; padding:0; }
    :root{ --card-max-w: 680px; }
    body{
      background:#191970;
      color:#fff;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:2em;
      box-sizing:border-box;
    }
    *,*::before,*::after{ box-sizing:inherit; }
    form,
    #planning{
      background:#fff;
      color:#000;
      border-radius:8px;
      padding:1.5em;
      box-shadow:0 2px 8px rgba(0,0,0,.2);
      margin:1em auto;
      width:100%;
      max-width:var(--card-max-w);
      word-break:break-word;
    }
    input,button{
      width:100%;
      padding:.8em;
      margin:.5em 0;
      font-size:1em;
      border:1px solid #ccc;
      border-radius:4px;
    }
    button{
      background:#0056b3;
      color:#fff;
      border:none;
      cursor:pointer;
      transition:background-color .2s ease;
    }
    button:hover{ background:#003f7f; }
    #feedback{ color:#d33; min-height:1.2em; margin-top:.5em; }
    #planning{ margin:2em auto; text-align:left; }
    .planning-header{
      font-style:italic;
      text-align:center;
      margin-bottom:1em;
      color:#254a7d;
    }
    .plan-header{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      margin-bottom:1.5em;
    }
    .plan-titles h2,
    .plan-titles h3{
      margin:0;
      line-height:1.25;
      color:#254a7d;
    }
    .plan-titles{ text-align:center; }
    .plan-titles h2{ font-size:1.3em; font-weight:bold; }
    .plan-titles h3{ font-size:1.1em; font-weight:bold; }
    .plan-logo{
      position:absolute;
      top:-20px;
      right:0;
      width:80px;
      height:auto;
    }
    .session{ margin-bottom:1em; }
    .session-bar{
      display:flex;
      align-items:center;
      flex-wrap:nowrap;
      background:#254a7d;
      color:#fff;
      padding:.4em .8em;
      border-radius:6px 6px 0 0;
      font-weight:bold;
      font-size:.95em;
    }
    .session-bar .session-title { flex:1 1 auto; text-align:left; }
    .session-bar .session-location{
      flex:0 0 auto;
      font-style:italic;
      margin-right:.4em;
      color:#6EC1FF;
    }
    .session-bar .session-time{ flex:0 0 auto; white-space:nowrap; }
    .session-body{
      background:#fff;
      list-style:disc inside;
      margin:0;
      padding:.8em 1em .8em 1.5em;
      border:1px solid #ccc;
      border-top:none;
      border-radius:0 0 6px 6px;
      color:#000;
    }
    .session-body li{ margin-bottom:.5em; line-height:1.4; }
    .session-footer{
      background:#fff;
      padding:.8em 1em;
      border:1px solid #ccc;
      border-top:none;
      border-radius:0 0 6px 6px;
      margin:0;
      color:#000;
      font-style:italic;
    }
    .group-number{ color:#0056b3; font-weight:bold; }
    .room-name{ font-style:italic; margin-left:.25em; color:#6EC1FF !important; }
    #downloadPdf{
      display:block;
      margin:1.5em auto;
      padding:.8em 1.2em;
      background:#254a7d;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:1em;
      text-transform:uppercase;
      letter-spacing:.05em;
      transition:background-color .2s ease;
    }
    #downloadPdf:hover{ background:#1e3f6f; }
    @media(max-width:480px){
      body{ padding:1em; }
      form,#planning{ padding:1em; }
      .session-bar,.session-body{ font-size:.9em; }
    }
    @media(max-width:320px){
      form,#planning{ padding:.6em; }
    }
    @page { margin:5mm; }
    @media print{
      #planning{
        max-width:var(--card-max-w);
        margin:0 auto;
        font-size:0.9em;
      }
      .session-bar{ padding:.25em .6em; font-size:.8em; }
      .session-body{ padding:.5em .9em .5em 1.3em; }
      .session-body li{ margin-bottom:.3em; }
      .session{ break-inside:avoid; }
      h1, #downloadPdf, form{ display:none; }
    }
    @media (max-width:500px){
      .plan-header{ padding-right:70px; }
      .plan-logo{ width:60px; top:-12px; }
      .plan-titles h2{ font-size:1.15rem; }
      .plan-titles h3{ font-size:.95rem; }
    }
    @media (max-width:350px){
      .plan-header{
        display:flex;
        flex-direction:column;
        align-items:center;
        padding-right:0;
      }
      .plan-logo{
        position:static;
        width:55px;
        margin-bottom:.5rem;
      }
    }
  </style>
</head>
<body>

<div id="page-accueil">
  <h1>Votre agenda<br>personnalisé :</h1>
  <form onsubmit="chercherPlanning(); return false;">
    <input id="prenom" type="text" placeholder="Prénom" />
    <input id="nom" type="text" placeholder="Nom" />
    <button type="submit">Voir mon planning</button>
    <p id="message-erreur"></p>
  </form>
</div>

<div id="page-planning" style="display:none;">
  <button onclick="retourAccueil()" style="width:auto; margin-bottom:1em;">← Retour</button>
  <div id="planning">
    <div class="plan-header">
      <div class="plan-titles">
        <h2>Séminaire Finance 2025</h2>
        <h3 id="nom-participant"></h3>
      </div>
      <div class="plan-logo" style="position:absolute;top:-20px;right:0;width:80px;text-align:center;border:2px solid #254a7d;border-radius:6px;padding:4px 6px;font-size:0.65rem;font-weight:bold;color:#254a7d;line-height:1.4;">
        SÉMINAIRE<br>FINANCE<br>11 JUIN 2026<br>✈ SAFRAN
      </div>
    </div>
    <div id="contenu-planning"></div>
    <p class="session-footer" style="text-align:center;">Fin de la journée à 17h30</p>
  </div>
</div>

<script>
  let donneesCSV = [];

  fetch('planning.csv')
    .then(r => r.text())
    .then(texte => {
      donneesCSV = parseCSV(texte);
    })
    .catch(() => {
      console.warn("Impossible de charger planning.csv");
    });

  function parseCSV(texte) {
    const lignes = texte.trim().split('\n');
    const entetes = lignes[0].split(';').map(e => e.trim().replace(/"/g,''));
    return lignes.slice(1).map(ligne => {
      const vals = ligne.split(';').map(v => v.trim().replace(/"/g,''));
      const obj = {};
      entetes.forEach((h, i) => obj[h] = vals[i] || '');
      return obj;
    });
  }

  function normaliser(txt) {
    return (txt || '').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .trim();
  }

  function chercherPlanning() {
    const prenom = normaliser(document.getElementById('prenom').value);
    const nom    = normaliser(document.getElementById('nom').value);

    if (!prenom || !nom) {
      document.getElementById('message-erreur').textContent =
        'Veuillez entrer votre prénom et votre nom.';
      return;
    }

    const resultats = donneesCSV.filter(ligne =>
      normaliser(ligne.prenom) === prenom &&
      normaliser(ligne.nom)    === nom
    );

    if (resultats.length === 0) {
      document.getElementById('message-erreur').textContent =
        "Aucun planning trouvé. Vérifiez l'orthographe de votre nom.";
      return;
    }

    afficherPlanning(resultats);
  }

  function afficherPlanning(activites) {
    const prenomAffiche = activites[0].prenom;
    const nomAffiche    = activites[0].nom.toUpperCase();
    document.getElementById('nom-participant').textContent =
      prenomAffiche + ' ' + nomAffiche;

    let html = '';
    activites.forEach(a => {
      html += `
        <div class="session">
          <div class="session-bar">
            <span class="session-title">${a.activite}</span>
            ${a.lieu  ? `<span class="session-location">${a.lieu}</span>` : ''}
            ${a.heure ? `<span class="session-time">${a.heure}</span>`    : ''}
          </div>
          <ul class="session-body">
            ${a.groupe  ? `<li><span class="group-number">${a.groupe}</span></li>` : ''}
            ${a.details ? `<li>${a.details}</li>` : ''}
          </ul>
        </div>`;
    });

    document.getElementById('contenu-planning').innerHTML = html;
    document.getElementById('page-accueil').style.display  = 'none';
    document.getElementById('page-planning').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function retourAccueil() {
    document.getElementById('page-accueil').style.display  = 'block';
    document.getElementById('page-planning').style.display = 'none';
    document.getElementById('message-erreur').textContent  = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') chercherPlanning();
  });
</script>

</body>
</html>
