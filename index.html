<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Séminaire Finance 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    html, body { margin:0; padding:0; }
    :root{ --card-max-w: 680px; --blue-dark: #1a2f5e; --blue-mid: #2d4a8a; --blue-light: #4a7fd4; --accent: #e8f0fe; }

    body{
      background: linear-gradient(135deg, #0f1f4a 0%, #1a2f5e 50%, #0d1b3e 100%);
      min-height: 100vh;
      color:#fff;
      font-family: 'Inter', Arial, sans-serif;
      text-align:center;
      padding:2em 1em;
      box-sizing:border-box;
    }
    *,*::before,*::after{ box-sizing:inherit; }

    #page-accueil h1{
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25em;
      letter-spacing: -0.02em;
    }
    #page-accueil p.subtitle{
      color: rgba(255,255,255,0.6);
      margin: 0 0 1.5em;
      font-size: 0.95rem;
    }

    form, #planning{
      background:#fff;
      color:#000;
      border-radius: 16px;
      padding: 2em;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      margin: 1em auto;
      width:100%;
      max-width: var(--card-max-w);
      word-break:break-word;
    }

    form { text-align: left; }
    form label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 0.3em;
      margin-top: 1em;
    }
    form label:first-of-type { margin-top: 0; }
    input{
      width:100%;
      padding: 0.75em 1em;
      font-size: 1em;
      font-family: inherit;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--blue-light); }
    button.btn-main{
      width:100%;
      padding: 0.85em;
      margin-top: 1.5em;
      font-size: 1em;
      font-family: inherit;
      font-weight: 600;
      background: linear-gradient(135deg, var(--blue-mid), var(--blue-light));
      color:#fff;
      border:none;
      border-radius: 8px;
      cursor:pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    button.btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
    button.btn-main:active { transform: translateY(0); }
    #message-erreur{ color:#e53e3e; font-size: 0.88rem; margin-top: 0.75em; min-height: 1.2em; }

    #planning { text-align:left; margin: 2em auto; padding: 1.75em; }

    .plan-header{
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.75em;
      padding-bottom: 1.25em;
      border-bottom: 2px solid #eef2ff;
    }
    .plan-titles h2 {
      margin: 0 0 0.2em;
      font-size: 1.25em;
      font-weight: 700;
      color: var(--blue-dark);
    }
    .plan-titles h3 {
      margin: 0;
      font-size: 1em;
      font-weight: 500;
      color: var(--blue-light);
    }
    .plan-badge{
      text-align:center;
      border: 2px solid var(--blue-mid);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--blue-mid);
      line-height: 1.5;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 1em;
    }

    /* SESSION NORMALE */
    .session { margin-bottom: 0.75em; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    .session-bar{
      display:flex;
      align-items: center;
      gap: 0.5em;
      background: var(--blue-mid);
      color:#fff;
      padding: 0.6em 1em;
      font-weight: 600;
      font-size: 0.9em;
    }
    .session-bar .session-title { flex:1 1 auto; }
    .session-bar .session-location{
      font-size: 0.8em;
      font-weight: 400;
      opacity: 0.8;
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .session-bar .session-time{
      font-size: 0.82em;
      font-weight: 700;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .session-body{
      background: #f8faff;
      list-style: none;
      margin:0;
      padding: 0.6em 1em;
      border: 1px solid #e8eef8;
      border-top: none;
    }
    .session-body li {
      margin-bottom: 0.3em;
      font-size: 0.88em;
      color: #444;
      line-height: 1.5;
    }

    .group-number{ color: var(--blue-mid); font-weight: 600; }

    /* SESSION PAUSE / DÉJEUNER */
    .session-break {
      margin-bottom: 0.75em;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 0.75em;
      background: #f0f0f0;
      border: 1px dashed #ccc;
      padding: 0.55em 1em;
      color: #777;
      font-size: 0.85em;
      font-weight: 500;
    }
    .session-break .break-icon { font-size: 1.1em; flex-shrink: 0; }
    .session-break .break-label { flex: 1; }
    .session-break .break-time {
      font-size: 0.8em;
      font-weight: 600;
      background: #e0e0e0;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      color: #555;
    }
    .session-break .break-location {
      font-size: 0.8em;
      color: #999;
      font-style: italic;
    }

    .session-footer{
      text-align: center;
      margin-top: 1.5em;
      padding: 0.75em;
      background: #eef2ff;
      border-radius: 8px;
      color: var(--blue-dark);
      font-size: 0.88em;
      font-weight: 500;
    }

    .btn-back{
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 0.5em 1.2em;
      font-family: inherit;
      font-size: 0.9em;
      cursor: pointer;
      margin-bottom: 1em;
      transition: background 0.2s;
      width: auto;
    }
    .btn-back:hover { background: rgba(255,255,255,0.25); }

    @media(max-width:480px){
      body { padding: 1em 0.75em; }
      form, #planning { padding: 1.25em; }
      .session-bar { font-size: 0.85em; flex-wrap: wrap; }
      #page-accueil h1 { font-size: 1.6rem; }
    }

    @page { margin: 8mm; }
    @media print{
      body { background: #fff; padding: 0; }
      #planning { box-shadow: none; max-width: 100%; }
      .session-bar { background: #2d4a8a !important; -webkit-print-color-adjust: exact; }
      .session { break-inside: avoid; }
      h1, .btn-back, form { display: none; }
    }
  </style>
</head>
<body>

<div id="page-accueil">
  <h1>Votre agenda personnalisé</h1>
  <p class="subtitle">Séminaire Finance · 11 Juin 2026</p>
  <form onsubmit="chercherPlanning(); return false;">
    <label for="prenom">Prénom</label>
    <input id="prenom" type="text" placeholder="ex : Anne" autocomplete="given-name" />
    <label for="nom">Nom</label>
    <input id="nom" type="text" placeholder="ex : DUPONT" autocomplete="family-name" />
    <button type="submit" class="btn-main">Voir mon planning →</button>
    <p id="message-erreur"></p>
  </form>
</div>

<div id="page-planning" style="display:none;">
  <button class="btn-back" onclick="retourAccueil()">← Retour</button>
  <div id="planning">
    <div class="plan-header">
      <div class="plan-titles">
        <h2>Séminaire Finance 2026</h2>
        <h3 id="nom-participant"></h3>
      </div>
      <div class="plan-badge">SÉMINAIRE<br>FINANCE<br>11 JUIN 2026<br>✈ SAFRAN</div>
    </div>
    <div id="contenu-planning"></div>
    <p class="session-footer">Fin de la journée à 17h30</p>
  </div>
</div>

<script>
  let donneesCSV = [];

  fetch('planning.csv')
    .then(r => r.text())
    .then(texte => {
      donneesCSV = parseCSV(texte);
    })
    .catch(() => {
      console.warn("Impossible de charger planning.csv");
    });

  function parseCSV(texte) {
    const lignes = texte.trim().split('\n');
    const entetes = lignes[0].split(';').map(e => e.trim().replace(/"/g,''));
    return lignes.slice(1).map(ligne => {
      const vals = ligne.split(';').map(v => v.trim().replace(/"/g,''));
      const obj = {};
      entetes.forEach((h, i) => obj[h] = vals[i] || '');
      return obj;
    });
  }

  function normaliser(txt) {
    return (txt || '').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .trim();
  }

  function estPauseOuDejeuner(activite) {
    const a = normaliser(activite);
    return a.startsWith('pause') || a.startsWith('dejeuner') || a.startsWith('déjeuner');
  }

  function iconeBreak(activite) {
    const a = normaliser(activite);
    if (a.startsWith('dejeuner') || a.startsWith('déjeuner')) return '🍽️';
    return '☕';
  }

  function chercherPlanning() {
    const prenom = normaliser(document.getElementById('prenom').value);
    const nom    = normaliser(document.getElementById('nom').value);

    if (!prenom || !nom) {
      document.getElementById('message-erreur').textContent =
        'Veuillez entrer votre prénom et votre nom.';
      return;
    }

    const resultats = donneesCSV.filter(ligne =>
      normaliser(ligne.prenom) === prenom &&
      normaliser(ligne.nom)    === nom
    );

    if (resultats.length === 0) {
      document.getElementById('message-erreur').textContent =
        "Aucun planning trouvé. Vérifiez l'orthographe de votre nom.";
      return;
    }

    afficherPlanning(resultats);
  }

  function afficherPlanning(activites) {
    const prenomAffiche = activites[0].prenom;
    const nomAffiche    = activites[0].nom.toUpperCase();
    document.getElementById('nom-participant').textContent =
      prenomAffiche + ' ' + nomAffiche;

    let html = '';
    activites.forEach(a => {
      if (estPauseOuDejeuner(a.activite)) {
        html += `
          <div class="session-break">
            <span class="break-icon">${iconeBreak(a.activite)}</span>
            <span class="break-label">${a.activite}</span>
            ${a.lieu  ? `<span class="break-location">${a.lieu}</span>` : ''}
            ${a.heure ? `<span class="break-time">${a.heure}</span>` : ''}
          </div>`;
      } else {
        const hasBody = a.groupe?.trim() || a.details?.trim();
        html += `
          <div class="session">
            <div class="session-bar">
              <span class="session-title">${a.activite}</span>
              ${a.lieu  ? `<span class="session-location">${a.lieu}</span>` : ''}
              ${a.heure ? `<span class="session-time">${a.heure}</span>`    : ''}
            </div>
            ${hasBody ? `<ul class="session-body">
              ${a.groupe  ? `<li><span class="group-number">${a.groupe}</span></li>` : ''}
              ${a.details ? `<li>${a.details}</li>` : ''}
            </ul>` : ''}
          </div>`;
      }
    });

    document.getElementById('contenu-planning').innerHTML = html;
    document.getElementById('page-accueil').style.display  = 'none';
    document.getElementById('page-planning').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function retourAccueil() {
    document.getElementById('page-accueil').style.display  = 'block';
    document.getElementById('page-planning').style.display = 'none';
    document.getElementById('message-erreur').textContent  = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') chercherPlanning();
  });
</script>

</body>
</html>
